name: CI

# Проверка качества на каждый PR и пуш в main: типы + юнит-тесты на деньги/даты/статусы.
# Не трогает БД (тесты — чистая логика). Должно быть зелёным до мержа.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test
