services:
  postgres:
    image: postgres:16-alpine
    container_name: white-one-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: whiteone
      POSTGRES_PASSWORD: whiteone_dev_pass
      POSTGRES_DB: whiteone
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whiteone -d whiteone"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: white-one-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@whiteone.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
